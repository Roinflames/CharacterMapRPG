<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Character Map</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="layout">
      <section class="panel">
        <h1>Character Map RPG</h1>
        <p>Muévete con <strong>WASD</strong> o <strong>flechas</strong>, supera los enfrentamientos y llega a la meta.</p>
        <p id="milestones-status" class="status">Hitos: 0/4</p>
        <p id="milestone-message" class="status-message">Sigue la ruta y activa todos los hitos.</p>
        <p class="version">UI v0.3.0</p>
      </section>

      <section class="game-shell" aria-label="Mapa del juego">
        <canvas id="game" width="640" height="352"></canvas>
      </section>

      <section id="encounter-panel" class="encounter hidden" aria-live="polite">
        <h2 id="enemy-name">Enfrentamiento</h2>
        <p id="combat-stats">HP jugador: 20 | HP enemigo: 0</p>
        <p id="battle-log">Explora el mapa para iniciar un combate.</p>
        <div class="encounter-actions">
          <button id="attack-btn" type="button">Atacar</button>
          <button id="heal-btn" type="button">Curar</button>
        </div>
      </section>

      <section class="controls" aria-label="Controles táctiles">
        <button data-dir="up" aria-label="Mover arriba">▲</button>
        <div>
          <button data-dir="left" aria-label="Mover izquierda">◀</button>
          <button data-dir="down" aria-label="Mover abajo">▼</button>
          <button data-dir="right" aria-label="Mover derecha">▶</button>
        </div>
      </section>
    </main>

    <script src="main.js"></script>
  </body>
</html>
